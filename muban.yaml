port: 7892
socks-port: 7891
mixed-port: 7890
allow-lan: true
mode: rule
log-level: warning
ipv6: true
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true
external-controller: :9090

sniffer:
  enable: true
  force-dns-mapping: false
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain: ['+.push.apple.com']

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
  device: Mihomo
  mtu: 1500
  ipv6: true
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.localdomain'
    - '+.localhost'
    - '+.home.arpa'
    - 'time.*.com'
    - 'ntp.*.com'
    - '*.ntp.org'
    - 'router.asus.com'
    - 'tplogin.cn'
    - '+.direct'
    - '+.music.163.com'
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    geosite:cn,private:
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
  respect-rules: true
  prefer-h3: false

proxies:
  - name: "Moe-Vless-ipv4"
    type: vless
    server: 填入ip地址
    port: 443
    flow: xtls-rprx-vision
    uuid: 填入uuid
    udp: true
    tls: true
    network: tcp
    servername: 填入sni伪装域名
    reality-opts: {public-key: 填入public-key, short-id: 填入short-id}
    client-fingerprint: chrome

  - name: "Moe-Tuic-ipv4"
    type: tuic
    server: 填入ip地址
    port: 443
    uuid: 填入uuid
    password: 填入TUIC 密码
    alpn: [h3]
    sni: 填入sni伪装域名
    disable-sni: false
    reduce-rtt: true
    skip-cert-verify: true
    congestion-controller: bbr

  - name: "Moe-Vless-ipv6"
    type: vless
    server: "填入ip地址"
    port: 443
    flow: xtls-rprx-vision
    uuid: 填入uuid
    udp: true
    tls: true
    network: tcp
    servername: 填入sni伪装域名
    reality-opts: {public-key: 填入public-key, short-id: 填入short-id}
    client-fingerprint: chrome

  - name: "Moe-Tuic-ipv6"
    type: tuic
    server: "填入ip地址"
    port: 443
    uuid: 填入uuid
    password: 填入TUIC 密码
    alpn: [h3]
    sni: 填入sni伪装域名
    disable-sni: false
    reduce-rtt: true
    skip-cert-verify: true
    congestion-controller: bbr

proxy-groups:
  - name: 主代理
    type: select
    proxies: [自动选择, Moe-Vless-ipv4, Moe-Tuic-ipv4, Moe-Vless-ipv6, Moe-Tuic-ipv6, DIRECT]

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies: [Moe-Vless-ipv4, Moe-Tuic-ipv4, Moe-Vless-ipv6, Moe-Tuic-ipv6]

  - name: Google
    type: select
    proxies: [主代理, Moe-Vless-ipv4, Moe-Vless-ipv6]

  - name: Telegram
    type: select
    proxies: [主代理, Moe-Vless-ipv4, Moe-Vless-ipv6]

  - name: OpenAI
    type: select
    proxies: [主代理, Moe-Vless-ipv4, Moe-Vless-ipv6]

  - name: Bilibili
    type: select
    proxies: [DIRECT, 主代理]

  - name: Apple
    type: select
    proxies: [DIRECT, 主代理]

  - name: Microsoft
    type: select
    proxies: [DIRECT, 主代理]

  - name: 中国大陆网站
    type: select
    proxies: [DIRECT, 主代理]

  - name: 黑名单网站
    type: select
    proxies: [主代理]
    
  - name: Bahamut
    type: select
    proxies: [主代理]
  - name: Discord
    type: select
    proxies: [主代理]
  - name: Netflix
    type: select
    proxies: [主代理]
  - name: Speedtest
    type: select
    proxies: [主代理]
  - name: Spotify
    type: select
    proxies: [主代理]
  - name: Steam
    type: select
    proxies: [DIRECT, 主代理]
  - name: TikTok
    type: select
    proxies: [主代理]
  - name: GoogleFCM
    type: select
    proxies: [主代理, DIRECT]

rule-providers:
  China-Site:
    type: http
    behavior: domain
    format: mrs
    url: 'https://cdn.jsdmirror.com/gh/HosheaPDNX/rule-set@V2.0.0/mihomo/China/China-Site.mrs'
    path: ./ruleset/China-Site.mrs
    interval: 86400
  China-IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: 'https://cdn.jsdmirror.com/gh/HosheaPDNX/rule-set@V2.0.0/mihomo/China/China-IP.mrs'
    path: ./ruleset/China-IP.mrs
    interval: 86400
  GFWList-Site:
    type: http
    behavior: domain
    format: mrs
    url: 'https://cdn.jsdmirror.com/gh/HosheaPDNX/rule-set@V2.0.0/mihomo/GFWList/GFWList-Site.mrs'
    path: ./ruleset/GFWList-Site.mrs
    interval: 86400
  Google-Site:
    type: http
    behavior: domain
    format: mrs
    url: 'https://cdn.jsdmirror.com/gh/HosheaPDNX/rule-set@V2.0.0/mihomo/Google/Google-Site.mrs'
    path: ./ruleset/Google-Site.mrs
    interval: 86400
  Local-IP:
    type: http
    behavior: ipcidr
    format: mrs
    url: 'https://cdn.jsdmirror.com/gh/HosheaPDNX/rule-set@V2.0.0/mihomo/Local/Local-IP.mrs'
    path: ./ruleset/Local-IP.mrs
    interval: 86400

rules:
  - 'AND,((DST-PORT,443),(NETWORK,UDP)),REJECT'
  - 'DOMAIN-KEYWORD,music,DIRECT'
  - 'DOMAIN,ntp.aliyun.com,DIRECT'
  - 'DOMAIN-KEYWORD,googleapis,Google'
  - 'RULE-SET,Google-Site,Google'
  - 'RULE-SET,GFWList-Site,黑名单网站'
  - 'RULE-SET,China-Site,中国大陆网站'
  - 'RULE-SET,Local-IP,DIRECT,no-resolve'
  - 'RULE-SET,China-IP,中国大陆网站,no-resolve'
  - 'GEOIP,CN,中国大陆网站,no-resolve'
  - 'MATCH,主代理'
